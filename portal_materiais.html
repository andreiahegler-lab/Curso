<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portal de Materiais</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
<style>
  /* ── TOKENS ───────────────────────────────────────────── */
  :root {
    --bg:        #0d0f14;
    --surface:   #13161e;
    --card:      #191d28;
    --border:    #252a38;
    --accent:    #4f8ef7;
    --accent2:   #7c5cfc;
    --success:   #34d399;
    --danger:    #f87171;
    --text:      #e8eaf0;
    --muted:     #6b7280;
    --radius:    14px;
  }

  /* ── RESET ────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 0 16px 60px;
    overflow-x: hidden;
  }

  /* ── BACKGROUND DECORATIVO ────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 800px; height: 600px;
    background: radial-gradient(ellipse at center, rgba(79,142,247,.13) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ───────────────────────────────────────────── */
  header {
    width: 100%; max-width: 600px;
    padding: 52px 0 0;
    text-align: center;
    position: relative; z-index: 1;
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(79,142,247,.1);
    border: 1px solid rgba(79,142,247,.25);
    border-radius: 100px;
    padding: 6px 16px 6px 10px;
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 22px;
  }
  .logo-badge svg { width:14px; height:14px; flex-shrink:0; }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.9rem, 5vw, 2.8rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -.02em;
    background: linear-gradient(135deg, #e8eaf0 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    margin-top: 10px;
    color: var(--muted);
    font-size: .95rem;
    line-height: 1.6;
  }

  /* ── CARD ─────────────────────────────────────────────── */
  .card {
    width: 100%; max-width: 480px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-top: 36px;
    position: relative; z-index: 1;
    box-shadow: 0 8px 40px rgba(0,0,0,.4);
    animation: slideUp .5s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(24px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .card-label {
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* ── INPUT + BOTÃO ────────────────────────────────────── */
  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  input[type="text"] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1.05rem;
    letter-spacing: .06em;
    padding: 13px 16px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,142,247,.15);
  }
  input[type="text"]::placeholder { color: var(--muted); letter-spacing: 0; font-size: .9rem; }

  button.btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 9px;
    color: #fff;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: .88rem;
    font-weight: 700;
    letter-spacing: .04em;
    padding: 13px 22px;
    transition: opacity .2s, transform .15s;
    white-space: nowrap;
  }
  button.btn-primary:hover  { opacity: .9; transform: translateY(-1px); }
  button.btn-primary:active { transform: translateY(0); }
  button.btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  /* ── MENSAGENS ────────────────────────────────────────── */
  .msg {
    margin-top: 14px;
    padding: 11px 14px;
    border-radius: 8px;
    font-size: .88rem;
    display: none;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from {opacity:0} to {opacity:1} }
  .msg.erro    { background: rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.3); color: var(--danger); }
  .msg.sucesso { background: rgba(52,211,153,.1);  border:1px solid rgba(52,211,153,.3);  color: var(--success); }
  .msg.show    { display: block; }

  /* ── SPINNER ──────────────────────────────────────────── */
  .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner.show { display: block; }

  /* ── PAINEL DE MATERIAIS ──────────────────────────────── */
  #painel {
    width: 100%; max-width: 600px;
    margin-top: 28px;
    position: relative; z-index: 1;
    display: none;
    animation: slideUp .5s cubic-bezier(.16,1,.3,1) both;
  }

  .painel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding: 0 4px;
  }
  .painel-titulo {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
  }
  .badge-qtd {
    background: rgba(79,142,247,.15);
    color: var(--accent);
    border-radius: 100px;
    padding: 3px 10px;
    font-size: .75rem;
    font-weight: 600;
  }

  /* ── ITEM ARQUIVO ─────────────────────────────────────── */
  .arquivo-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color .2s, transform .15s;
  }
  .arquivo-item:hover { border-color: rgba(79,142,247,.4); transform: translateY(-1px); }

  .arquivo-icon {
    width: 40px; height: 40px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }
  .arquivo-icon.pdf   { background: rgba(248,113,113,.12); }
  .arquivo-icon.video { background: rgba(124,92,252,.12); }
  .arquivo-icon.img   { background: rgba(52,211,153,.12); }
  .arquivo-icon.outro { background: rgba(79,142,247,.12); }

  .arquivo-info { flex: 1; min-width: 0; }
  .arquivo-nome {
    font-size: .9rem;
    font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .arquivo-meta {
    font-size: .75rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .btn-dl {
    background: rgba(79,142,247,.1);
    border: 1px solid rgba(79,142,247,.25);
    border-radius: 8px;
    color: var(--accent);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: .8rem;
    font-weight: 500;
    padding: 7px 14px;
    text-decoration: none;
    transition: background .2s;
    white-space: nowrap;
    display: flex; align-items: center; gap: 5px;
  }
  .btn-dl:hover { background: rgba(79,142,247,.2); }
  .btn-dl svg { width:13px; height:13px; }

  /* ── RODAPÉ ───────────────────────────────────────────── */
  footer {
    margin-top: 48px;
    color: var(--muted);
    font-size: .75rem;
    text-align: center;
    position: relative; z-index: 1;
  }

  /* ── RESPONSIVO ───────────────────────────────────────── */
  @media (max-width: 480px) {
    .card { padding: 24px 18px; }
    .input-wrap { flex-direction: column; }
    button.btn-primary { width: 100%; }
  }
</style>
</head>
<body>

<!-- CABEÇALHO -->
<header>
  <div class="logo-badge">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    Acesso Restrito
  </div>
  <h1>Portal de<br/>Materiais</h1>
  <p class="subtitle">Digite seu CPF cadastrado para acessar<br/>os materiais disponíveis.</p>
</header>

<!-- CARD DE LOGIN -->
<div class="card" id="card-login">
  <p class="card-label">Identificação</p>
  <div class="input-wrap">
    <input
      type="text"
      id="cpf-input"
      placeholder="000.000.000-00"
      maxlength="14"
      autocomplete="off"
      inputmode="numeric"
    />
    <button class="btn-primary" id="btn-entrar" onclick="entrar()">
      <span id="btn-texto">Entrar</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </div>
  <div class="msg" id="msg-erro"></div>
</div>

<!-- PAINEL DE ARQUIVOS -->
<div id="painel">
  <div class="painel-header">
    <span class="painel-titulo">📂 Materiais disponíveis</span>
    <span class="badge-qtd" id="badge-qtd">0 arquivos</span>
  </div>
  <div id="lista-arquivos"></div>
</div>

<footer>Acesso permitido apenas para alunos cadastrados.</footer>

<script>
// ⚙️ COLE AQUI A URL DO SEU WEB APP (Apps Script → Implantar → Gerenciar implantações)
const API_URL = "https://script.google.com/macros/s/AKfycbyNmDHP7uZ-p8HN5EfIuvD5K6jwfqdllBukmdBRGV16Hf6hwLYTUepuIp3LmFcCg9vg5g/exec";

let cpfAtual = "";

// ── MÁSCARA DE CPF ──────────────────────────────────────────
const input = document.getElementById("cpf-input");
input.addEventListener("input", () => {
  let v = input.value.replace(/\D/g, "").slice(0, 11);
  if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, "$1.$2.$3-$4");
  else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, "$1.$2.$3");
  else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, "$1.$2");
  input.value = v;
});

input.addEventListener("keydown", e => { if (e.key === "Enter") entrar(); });

// ── ENTRAR ──────────────────────────────────────────────────
async function entrar() {
  const cpf = input.value.replace(/\D/g, "");
  ocultarMsg();

  if (cpf.length !== 11) {
    mostrarErro("Digite um CPF completo (11 dígitos).");
    return;
  }

  setBtnLoading(true);

  try {
    const r = await fetch(`${API_URL}?action=files&cpf=${cpf}`);
    const dados = await r.json();

    if (dados.ok) {
      cpfAtual = cpf;
      renderizarArquivos(dados.arquivos);
    } else {
      mostrarErro(dados.erro || "Acesso negado.");
    }
  } catch (e) {
    mostrarErro("Não foi possível conectar ao servidor. Tente novamente.");
  } finally {
    setBtnLoading(false);
  }
}

// ── RENDERIZAR ARQUIVOS ─────────────────────────────────────
function renderizarArquivos(arquivos) {
  document.getElementById("card-login").style.display = "none";

  const painel = document.getElementById("painel");
  const lista  = document.getElementById("lista-arquivos");
  const badge  = document.getElementById("badge-qtd");

  badge.textContent = `${arquivos.length} arquivo${arquivos.length !== 1 ? "s" : ""}`;
  lista.innerHTML = "";

  if (arquivos.length === 0) {
    lista.innerHTML = `<div class="arquivo-item" style="justify-content:center;color:var(--muted)">Nenhum material disponível no momento.</div>`;
  } else {
    arquivos.forEach(arq => {
      const { classe, emoji } = tipoArquivo(arq.tipo);
      const tamanho = formatarTamanho(arq.tamanho);
      lista.innerHTML += `
        <div class="arquivo-item">
          <div class="arquivo-icon ${classe}">${emoji}</div>
          <div class="arquivo-info">
            <div class="arquivo-nome" title="${arq.nome}">${arq.nome}</div>
            <div class="arquivo-meta">${tamanho}</div>
          </div>
          <a class="btn-dl" href="${arq.linkDownload}" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Baixar
          </a>
        </div>`;
    });
  }

  painel.style.display = "block";
}

// ── UTILITÁRIOS ─────────────────────────────────────────────
function tipoArquivo(mime) {
  if (!mime) return { classe: "outro", emoji: "📄" };
  if (mime.includes("pdf"))   return { classe: "pdf",   emoji: "📕" };
  if (mime.includes("video")) return { classe: "video", emoji: "🎬" };
  if (mime.includes("image")) return { classe: "img",   emoji: "🖼️" };
  if (mime.includes("zip") || mime.includes("rar")) return { classe: "outro", emoji: "🗜️" };
  if (mime.includes("presentation") || mime.includes("powerpoint")) return { classe: "outro", emoji: "📊" };
  if (mime.includes("document") || mime.includes("word")) return { classe: "outro", emoji: "📝" };
  return { classe: "outro", emoji: "📎" };
}

function formatarTamanho(bytes) {
  if (!bytes) return "";
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
}

function mostrarErro(texto) {
  const el = document.getElementById("msg-erro");
  el.textContent = texto;
  el.className = "msg erro show";
}
function ocultarMsg() {
  document.getElementById("msg-erro").className = "msg";
}
function setBtnLoading(on) {
  document.getElementById("btn-entrar").disabled = on;
  document.getElementById("btn-texto").style.display = on ? "none" : "inline";
  document.getElementById("spinner").className = on ? "spinner show" : "spinner";
}
</script>
</body>
</html>
